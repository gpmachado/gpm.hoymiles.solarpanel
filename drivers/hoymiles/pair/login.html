<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input { width: 100%; padding: 8px; box-sizing: border-box; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
    button { margin-top: 16px; width: 100%; padding: 10px; background: #007aff; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
    button:disabled { background: #aaa; }
    .status { margin-top: 12px; font-size: 13px; color: #555; text-align: center; }
  </style>
</head>
<body>
  <label for="ip" data-i18n="pair.ip_label">DTU IP Address</label>
  <input id="ip" type="text" autocomplete="off" />
  <div class="hint" data-i18n="pair.ip_hint">Leave empty to scan the network automatically.</div>

  <label for="serial" style="margin-top:14px;">
    <span data-i18n="pair.serial_label">DTU Serial Number</span>
    <span style="font-weight:normal;color:#888" data-i18n="pair.serial_optional"> (optional)</span>
  </label>
  <input id="serial" type="text" autocomplete="off" />
  <div class="hint" data-i18n="pair.serial_hint">Detected automatically from the DTU. Only fill in as fallback.</div>

  <button id="btn" onclick="connect()" data-i18n="pair.connect_button">Connect</button>
  <div class="status" id="status"></div>

  <script>
    document.getElementById('ip').placeholder    = Homey.__('pair.ip_placeholder');
    document.getElementById('serial').placeholder = Homey.__('pair.serial_placeholder');

    function connect() {
      var ip     = document.getElementById('ip').value.trim();
      var btn    = document.getElementById('btn');
      var status = document.getElementById('status');

      btn.disabled = true;
      status.textContent = ip
        ? Homey.__('pair.status_connecting', { ip: ip })
        : Homey.__('pair.status_scanning');

      var serial = document.getElementById('serial').value.trim();
      Homey.emit('login', { username: ip, password: serial }, function(err, result) {
        if (err) {
          status.textContent = err.message || err;
          btn.disabled = false;
        } else {
          Homey.nextView();
        }
      });
    }

    document.getElementById('ip').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') connect();
    });
  </script>
</body>
</html>
